synthetic:
  output_dir: data/synthetic
  seed: 7
  split_sizes:
    train: 8000
    val: 500
    test: 1000
  smoke_split_sizes:
    train: 16
    val: 4
    test: 4
  num_sites: [8, 16]
  wl_stations_per_site: [2, 4]
  fault_site_count: [1, 3]
  an_site_count: [1, 2]
  backup_link_probability: 0.18
  noise_probability: 0.08
  topology_mode: random_tree
dataset_paths:
  train: data/synthetic/transformed_train.json
  val: data/synthetic/transformed_val.json
  test: data/synthetic/transformed_test.json
batching:
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 8
  dataloader_drop_last: false
  dataloader_num_workers: 0
  dataloader_pin_memory: false
model:
  in_dim: 32
  n_hid: 64
  num_layers: 6
  n_heads: 8
  dropout: 0.3
  num_types: 3
  num_relations: 9
  conv_name: hgt
  use_rte: false
metrics:
  ks: [5, 10, 20, 50]
training_args:
  num_train_epochs: 8
  learning_rate: 0.00025
  weight_decay: 0.005
  warmup_ratio: 0.1
  logging_steps: 1
  seed: 13
outputs:
  checkpoints_dir: outputs/checkpoints
  results_dir: outputs/results
